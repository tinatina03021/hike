<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登山行程規劃</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f4f1 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 防止山脊動畫溢出 */
            position: relative;
        }

        /* 毛玻璃效果卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* 按鈕漸層與陰影 */
        .btn-gradient {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.6);
            transform: translateY(-2px);
        }

        /* 背景山脊剪影動畫 (與規劃器風格一致，但更顯眼一點作為背景) */
        .mountain-bg {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 40vh;
            z-index: 0;
            opacity: 0;
            animation: fadeInOutMountains 15s infinite ease-in-out;
        }
        .mountain-bg.layer-2 {
            bottom: 20px;
            animation-delay: 3s;
        }

        @keyframes fadeInOutMountains {
            0% { opacity: 0; transform: translateY(30px); }
            20% { opacity: 0.4; transform: translateY(0); }
            80% { opacity: 0.4; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(30px); }
        }
    </style>
</head>
<body class="p-6">

    <svg class="mountain-bg layer-1" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#a3b18a" d="M0,224L48,213.3C96,203,192,181,288,192C384,203,480,245,576,234.7C672,224,768,160,864,138.7C960,117,1056,139,1152,149.3C1248,160,1344,160,1392,160L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="mountain-bg layer-2" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#84a98c" d="M0,192L60,197.3C120,203,240,213,360,192C480,171,600,117,720,122.7C840,128,960,192,1080,213.3C1200,235,1320,213,1380,202.7L1440,192L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
    </svg>

    <div class="glass-card text-center p-10 md:p-16 max-w-xl shadow-2xl relative z-10 deploy-target">
        
        <div class="flex justify-center mb-8">
            <div class="relative w-24 h-16">
                <div class="absolute bottom-0 left-0 w-12 h-12 bg-emerald-600 rotate-45 rounded-lg shadow-lg"></div>
                <div class="absolute bottom-0 right-0 w-16 h-16 bg-emerald-500 rotate-45 rounded-xl shadow-md"></div>
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight mb-4">登山行程規劃</h1>
        
        <p class="text-emerald-700 font-bold text-lg mb-10 tracking-wide deploy-target-text">好天氣 出大景 :)</p>
        
        <div class="border-t border-slate-200/50 pt-10">
            <p class="text-slate-600 mb-6 text-sm md:text-base px-4 deploy-target-subtext">輕鬆規劃每一天的路線、時間與里程，<br>掌握旅程的每一個節奏。</p>
            
            <a href="planner.html" class="btn-gradient inline-block text-white px-10 py-4 rounded-full font-black text-lg deploy-target-btn">
                開始規劃旅程
            </a>
        </div>
    </div>

</body>
</html>
