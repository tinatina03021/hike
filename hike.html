<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登山行程規劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f4f1 0%, #e2e8f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 徹底移除數字輸入框箭頭 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-clean {
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            transition: all 0.3s;
        }
        .input-clean:focus {
            border-bottom-color: #10b981;
            outline: none;
        }

        .mountain-bg {
            position: fixed;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 30vh;
            z-index: -1;
            opacity: 0;
            animation: fadeInOutMountains 20s infinite ease-in-out;
        }
        
        .mountain-bg.layer-2 {
            bottom: -20px;
            animation-delay: 5s;
            opacity: 0;
        }

        @keyframes fadeInOutMountains {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 0.3; transform: translateY(0); }
            80% { opacity: 0.3; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .day-card { box-shadow: none !important; border: 1px solid #eee !important; page-break-inside: avoid; }
            .mountain-bg { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <svg class="mountain-bg layer-1" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#a3b18a" d="M0,224L48,213.3C96,203,192,181,288,192C384,203,480,245,576,234.7C672,224,768,160,864,138.7C960,117,1056,139,1152,149.3C1248,160,1344,160,1392,160L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="mountain-bg layer-2" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#84a98c" d="M0,192L60,197.3C120,203,240,213,360,192C480,171,600,117,720,122.7C840,128,960,192,1080,213.3C1200,235,1320,213,1380,202.7L1440,192L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
    </svg>

    <div class="max-w-4xl mx-auto">
        <header class="glass rounded-3xl p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full -mr-16 -mt-16"></div>
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-end gap-6">
                <div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight">登山行程規劃</h1>
                    <p class="text-emerald-700 font-bold mt-2">好天氣 出大景 :)</p>
                </div>
                <div class="bg-slate-800 text-white rounded-2xl p-4 min-w-[160px] shadow-lg">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">總里程數</p>
                    <p class="text-3xl font-mono font-bold text-emerald-400"><span id="total-km">0</span><span class="text-sm ml-1 text-white/50">km</span></p>
                </div>
            </div>
        </header>

        <div class="glass rounded-2xl p-6 mb-10 shadow-md border-l-8 border-emerald-500 no-print">
            <div class="flex flex-wrap gap-6 items-center">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">第一天 (D1) 日期</label>
                    <input type="date" id="base-date" onchange="calculateSchedule()" class="w-full bg-white/50 rounded-xl px-4 py-2 border-none ring-1 ring-slate-200 focus:ring-2 ring-emerald-500">
                </div>
                <p class="text-sm text-slate-400 italic md:mt-6">系統將自動產生 D0 並推算後續日期</p>
            </div>
        </div>

        <div id="day-container">
            </div>

        <div class="flex flex-col gap-4 no-print mb-20">
            <button onclick="addDay()" class="w-full py-5 bg-white border-2 border-dashed border-slate-300 text-slate-500 rounded-3xl hover:border-emerald-500 hover:text-emerald-600 transition-all font-black text-lg">
                ＋ 新增行程天數
            </button>
        </div>
    </div>

    <button onclick="window.print()" class="fixed bottom-8 right-8 no-print bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3 font-bold z-50">
        列印規劃表
    </button>

    <script>
        let dayCount = -1; // 從 -1 開始，這樣第一個 addDay 會變成 Day 0
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

        function addDay() {
            dayCount++;
            const currentDayNum = dayCount;
            const dayId = `day-${currentDayNum}`;
            const dayLabel = currentDayNum === 0 ? "D0" : `D${currentDayNum}`;
            
            const dayHtml = `
                <div class="day-card glass rounded-3xl p-6 mb-12 shadow-xl border border-white/50" id="${dayId}">
                    <div class="flex flex-wrap justify-between items-center border-b border-slate-200 pb-6 mb-8 gap-4">
                        <div class="flex items-center gap-4">
                            <span class="text-4xl font-black text-slate-800 italic">${dayLabel}</span>
                            <div class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full font-bold text-sm">
                                <span class="date-display">----/--/--</span> (<span class="week-display">-</span>)
                            </div>
                        </div>
                        <div class="flex items-center gap-4 no-print">
                            <div class="flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-1.5 border border-slate-200">
                                <span class="text-[10px] font-black text-slate-400 uppercase">出發時刻:</span>
                                <input type="time" value="${currentDayNum === 0 ? '19:00' : '06:00'}" onchange="calculateSchedule()" class="day-start-time bg-transparent font-mono font-bold text-slate-700 outline-none">
                            </div>
                            ${currentDayNum > 1 ? `<button onclick="removeDay('${dayId}')" class="text-slate-300 hover:text-red-500 transition-colors">移除</button>` : ''}
                        </div>
                        <div class="hidden print:block font-bold text-slate-500 text-sm">
                            出發時刻: <span class="print-start-time">--:--</span>
                        </div>
                    </div>
                    
                    <div id="nodes-${dayId}"></div>
                    
                    <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center">
                        <button onclick="addNode('${dayId}')" class="no-print bg-emerald-50 text-emerald-600 px-6 py-2 rounded-xl font-bold hover:bg-emerald-100 transition-all text-sm">
                            ＋ 增加路段
                        </button>
                        <div class="flex gap-6 text-sm font-bold">
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider">本日里程</p>
                                <p class="text-lg text-slate-700 font-mono"><span class="day-total-km">0</span> km</p>
                            </div>
                            <div class="text-right border-l border-slate-200 pl-6">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider">預估耗時</p>
                                <p class="text-lg text-slate-700 font-mono"><span class="day-total-time">0h 0m</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('day-container').insertAdjacentHTML('beforeend', dayHtml);
            
            // 預設路段
            if(currentDayNum === 0) {
                addNode(dayId, "出發地");
                addNode(dayId, "抵達宿點");
            } else {
                addNode(dayId, "起點/營地");
                addNode(dayId, "下個地點");
            }
            calculateSchedule();
        }

        function addNode(dayId, placeholder = "地點名稱") {
            const nodesContainer = document.getElementById(`nodes-${dayId}`);
            const nodeCount = nodesContainer.querySelectorAll('.location-node').length;

            if (nodeCount > 0) {
                const gapHtml = `
                    <div class="gap-row ml-12 my-6 pl-10 relative">
                        <div class="absolute left-0 top-0 bottom-0 w-[2px] bg-slate-200"></div>
                        <div class="absolute left-[-4px] top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-slate-300 rounded-full border-2 border-white"></div>

                        <div class="bg-slate-50/80 rounded-2xl p-4 border border-slate-100 group hover:shadow-md transition-all">
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">距離 (km)</label>
                                    <input type="number" step="0.1" oninput="calculateSchedule()" class="km-input w-full text-xl font-mono font-bold input-clean text-emerald-600" placeholder="0.0">
                                </div>
                                <div class="flex gap-4">
                                    <div class="flex-1">
                                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">小時</label>
                                        <input type="number" oninput="calculateSchedule()" class="hr-input w-full text-xl font-mono font-bold input-clean text-slate-700" placeholder="0">
                                    </div>
                                    <div class="flex-1 border-l border-slate-200 pl-4">
                                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">分鐘</label>
                                        <input type="number" oninput="calculateSchedule()" class="min-input w-full text-xl font-mono font-bold input-clean text-slate-700" placeholder="0">
                                    </div>
                                </div>
                            </div>
                            <div class="pt-2 border-t border-slate-200/50">
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 italic text-slate-300">路線備註</label>
                                <input type="text" class="w-full text-sm input-clean py-1 text-slate-500 italic" placeholder="...">
                            </div>
                        </div>
                    </div>
                `;
                nodesContainer.insertAdjacentHTML('beforeend', gapHtml);
            }

            const nodeHtml = `
                <div class="location-node flex items-center gap-6 group">
                    <div class="time-display flex-shrink-0 w-20 h-10 flex items-center justify-center bg-slate-800 text-emerald-400 rounded-xl font-mono font-bold text-lg shadow-lg ring-4 ring-white">00:00</div>
                    <div class="flex-1">
                        <input type="text" placeholder="${placeholder}" class="w-full text-2xl font-black text-slate-700 input-clean py-2">
                    </div>
                    <button onclick="removeNode(this)" class="no-print opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all p-2">✕</button>
                </div>
            `;
            nodesContainer.insertAdjacentHTML('beforeend', nodeHtml);
            calculateSchedule();
        }

        function removeNode(btn) {
            const node = btn.closest('.location-node');
            const prevGap = node.previousElementSibling;
            if (prevGap && prevGap.classList.contains('gap-row')) prevGap.remove();
            else if (node.nextElementSibling && node.nextElementSibling.classList.contains('gap-row')) node.nextElementSibling.remove();
            node.remove();
            calculateSchedule();
        }

        function removeDay(id) {
            if(confirm("確定要刪除這天嗎？")) {
                document.getElementById(id).remove();
                calculateSchedule();
            }
        }

        function calculateSchedule() {
            const baseDateVal = document.getElementById('base-date').value;
            let totalKm = 0;
            const days = document.querySelectorAll('.day-card');
            
            days.forEach((day, index) => {
                // 日期推算邏輯：Day 0 為 BaseDate - 1
                if (baseDateVal) {
                    let date = new Date(baseDateVal);
                    // 這裡的 index 是 DOM 中的順序，假設 D0 永遠在第一個
                    date.setDate(date.getDate() + (index - 1)); 
                    const dateStr = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
                    day.querySelector('.date-display').innerText = dateStr;
                    day.querySelector('.week-display').innerText = weekDays[date.getDay()];
                }

                const startTime = day.querySelector('.day-start-time').value;
                day.querySelector('.print-start-time').innerText = startTime;
                let [h, m] = startTime.split(':').map(Number);
                let currentMins = h * 60 + m;
                let dayKm = 0;
                let dayMins = 0;

                const nodes = day.querySelectorAll('.location-node');
                const gaps = day.querySelectorAll('.gap-row');

                nodes.forEach((node, nIdx) => {
                    const disp = node.querySelector('.time-display');
                    disp.innerText = `${String(Math.floor((currentMins/60)%24)).padStart(2,'0')}:${String(currentMins%60).padStart(2,'0')}`;

                    if (gaps[nIdx]) {
                        const km = Number(gaps[nIdx].querySelector('.km-input').value) || 0;
                        const hr = Number(gaps[nIdx].querySelector('.hr-input').value) || 0;
                        const min = Number(gaps[nIdx].querySelector('.min-input').value) || 0;
                        const dur = (hr * 60) + min;
                        currentMins += dur;
                        dayKm += km;
                        dayMins += dur;
                        totalKm += km;
                    }
                });
                day.querySelector('.day-total-km').innerText = dayKm.toFixed(1);
                day.querySelector('.day-total-time').innerText = `${Math.floor(dayMins/60)}h ${dayMins%60}m`;
            });
            document.getElementById('total-km').innerText = totalKm.toFixed(1);
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('base-date').value = today;
            addDay(); // 生成 D0
            addDay(); // 生成 D1
        };
    </script>
</body>
</html>
